<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>test</title>
    <style>
@font-face {
  font-family: 'MyIPAmjMincho';
  src: url('/fonts/ipamjm.ttf') format('truetype');
  font-display: swap; /* 読み込み中もテキストを表示させる設定 */
}

.name-field {
  font-family: 'MyIPAmjMincho', serif;
}

#output {
  font-size: xxx-large;
}
    </style>
    <script> 
  window.onload = function () {
    const display = document.querySelector('#aaa');
 
    // --- ここから追加 ---
    const button1 = document.querySelector('#button1');
    const button2 = document.querySelector('#button2');
    const button3 = document.querySelector('#button3');
 
    button1.addEventListener('click', () => buttonClick(1));
    button2.addEventListener('click', () => buttonClick(2));
    button3.addEventListener('click', () => buttonClick(3));
    // --- ここまで追加 ---
 
    // 画面を更新するための関数
    function updateContent(text) {
      display.innerHTML = text;
    }
 
    // 各ボタンのクリック処理
    function buttonClick(num) {
      const text = `click ${num}`;
      updateContent(text);
      navigation.navigate(text, {state:`/state${num}`}, {history: 'replace'});
      //history.pushState({ text: text }, '', `/state${num}`);
    }
 
    // popstateイベントリスナーを追加
//    window.addEventListener('popstate', (event) => {
    navigation.addEventListener('navigate', navigateEvent => {

      // 外部サイトへの移動やダウンロードは無視する
      if (!navigateEvent.canIntercept || navigateEvent.hashChange || navigateEvent.downloadRequest) return;

      let aa = navigateEvent.destination.getState();
      console.log('navigate event fired!', aa);

      navigateEvent.intercept({

        handler : () => {
          if (aa) {
            updateContent(aa);
          } else {
            updateContent("pushの挙動を確認する");
          }
        }
      });
    });
 
    // ページが最初に読み込まれたときの初期表示
    updateContent("pushの挙動を確認する");



    document.getElementById('csvFile').addEventListener('change', function(e){
      const file = e.target.files[0];
      if (!file) {
        return;
      }

      console.log("file object:",file);
      const reader = new FileReader();

      reader.onload = function (event) {
        displayDat(event.target.result);
      }

      reader.onerror = function (event) {
        console.log("file 読み込みエラー:",reader.error);
      }

      reader.readAsText(file, "UTF-8");

    })

    function displayDat(data) {
      const output = document.getElementById('output');
      output.innerText = JSON.stringify(data, null, 2);
    }
  }

    </script>
  </head>
  <body>
    <button id="button1">1</button>
    <button id="button2">2</button>
    <button id="button3">3</button>
    <p id="aaa">
      aa
    </p>
  <hr>
  <input type="file" id="csvFile" accept=".csv">
  <div class="name-field" id="output"><div>
  </body>
</html>
